<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    .orbitron {
      font-family: 'Orbitron', sans-serif;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0f172a] via-[#111827] to-[#1e293b]">

  <div class="w-96 bg-[#fefee3] p-6 rounded-2xl shadow-2xl border border-[#1f2937] text-black">

    <h1 class="text-center text-3xl font-bold mb-4 orbitron">
      Tic Tac Toe
    </h1>

    <p id="status" class="text-center text-lg text-slate-400 mb-4">
      Player X Turn
    </p>

    <div id="board" class="grid grid-cols-3 gap-3 w-80 mx-auto aspect-square">

      <!-- 9 Cells -->
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>

    </div>

    <button id="reset"
      class="mt-6 w-full bg-gradient-to-r from-[#00f5ff] to-[#ff00c8] text-black font-bold py-3 rounded-xl hover:scale-105 active:scale-95 transition duration-300">
      Restart Game
    </button>

  </div>

  <script src="app.js"></script>

</body>
</html>
